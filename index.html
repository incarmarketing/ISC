    const chineseDays = ["", "第一天", "第二天", "第三天", "第四天"];

    // --- [필터링 엔진] 사용자 정보에 맞춰 데이터 가공 ---
    const getPersonalizedTripData = (userProfile) => {
      const data = JSON.parse(JSON.stringify(BASE_TRIP_DATA));
      
      if(userProfile.flightOut) {
        data.days[0].events[0].note = `${userProfile.flightOut} (기내식 포함)`;
      }
      if(userProfile.flightIn) {
        data.days[3].events[1].note = `${userProfile.flightIn} (소중한 추억을 안고 귀국)`;
      }

      let day2Events = data.days[1].events;
      if (userProfile.day2 === "티엔라이 온천 힐링") {
        day2Events = day2Events.filter(e => !e.title.includes("고궁박물관"));
        day2Events[0].title = "티엔라이 온천 힐링";
      } else if (userProfile.day2 === "고궁박물관 역사투어") {

            <div className="text-center mt-6">

    // --- 개인화 정보 대시보드 컴포넌트 ---

    // --- 헬퍼 함수 및 컴포넌트 유지 (날씨, 환율) ---
    const parseWeatherCode = (code) => {
      if (code === 0) return { desc: '맑음', type: 'sunny' };
      if ([1, 2].includes(code)) return { desc: '구름 조금', type: 'partly' };
      if (code === 3) return { desc: '흐림', type: 'cloudy' };
      if ([45, 48].includes(code)) return { desc: '안개', type: 'cloudy' };
      if ([51, 53, 55, 56, 57].includes(code)) return { desc: '이슬비', type: 'rainy' };
      if ([61, 63, 65, 66, 67, 80, 81, 82].includes(code)) return { desc: '비', type: 'rainy' };
      if ([71, 73, 75, 77, 85, 86].includes(code)) return { desc: '눈', type: 'cloudy' };
      if ([95, 96, 99].includes(code)) return { desc: '뇌우', type: 'rainy' };
      return { desc: '알수없음', type: 'sunny' };
    };

    const getWeatherIcon = (type, className="w-5 h-5") => {
      switch(type) {
        case 'sunny': return <Sun className={`${className} text-orange-500`} />;
        case 'cloudy': return <Cloud className={`${className} text-gray-400`} />;
        case 'rainy': return <CloudRain className={`${className} text-blue-500`} />;
        case 'partly': return <CloudSun className={`${className} text-yellow-500`} />;
        default: return <Sun className={`${className} text-orange-500`} />;
      }
    };

    const IconByType = ({ type }) => {
      switch (type) {
        case 'meal': return <Utensils className="w-5 h-5 text-orange-500" />;
        case 'spot': return <Camera className="w-5 h-5 text-blue-500" />;
        case 'cafe': return <Coffee className="w-5 h-5 text-brown-500" />;

      useEffect(() => {
        if (isOpen) {
          const defaultRate = liveExchange || "42.50";

            setCustomRate(defaultRate);
            setKrwVal(Math.round(100 * parseFloat(defaultRate)).toString());
          }
        }
      }, [isOpen, liveExchange]);

      if (!isOpen) return null;

      const rateToUse = parseFloat(customRate) || 42.50;

      const parseNum = (str) => str.toString().replace(/,/g, '');
      const formatNum = (str) => {
        if (!str) return "";
        const parts = str.toString().split('.');
        parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        return parts.join('.');
      };

      const handleTwdChange = (e) => {
        const rawVal = parseNum(e.target.value);
        if (isNaN(rawVal)) return;
        setTwdVal(rawVal);
        if (rawVal === '') setKrwVal('');
        else setKrwVal(Math.round(Number(rawVal) * rateToUse).toString());
      };

      const handleKrwChange = (e) => {
        const rawVal = parseNum(e.target.value);
        if (isNaN(rawVal)) return;
        setKrwVal(rawVal);
        if (rawVal === '') setTwdVal('');
        else setTwdVal((Number(rawVal) / rateToUse).toFixed(2).replace(/\.00$/, ''));

        const current = parseFloat(customRate) || 0;

          <header className="relative flex flex-col w-full min-h-[400px] md:min-h-[500px] overflow-hidden bg-white">
            <div className="absolute inset-0 z-0">
              {/* 이전 사진으로 복구 (아침 안개 낀 타이베이 도시 전경) */}
              <img src="https://images.unsplash.com/photo-1470004914212-05527e49370b?auto=format&fit=crop&q=80&w=2000" alt="Taipei City" className="w-full h-full object-cover object-center" />
              {/* 회색 그라데이션 필터를 완전히 삭제하고 단순 어두운 틴트 하나만 적용 */}
              <div className="absolute inset-0 bg-black/20" />
            </div>
            
            <nav className="relative z-10 w-full p-4 md:p-6 flex justify-between items-center text-slate-800">
              <div className="text-lg md:text-xl font-black tracking-tight bg-white px-5 py-2 rounded-full font-montserrat shadow-md">
                INCAR TRIP
              </div>
            </nav>

            <div className="relative z-10 w-full px-4 md:px-12 pt-10 pb-6 max-w-6xl mx-auto flex flex-col justify-end">
              <div className="text-3xl md:text-5xl font-montserrat font-black text-[#FFD700] mb-1 tracking-[0.1em] drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)]">
                2025
              </div>
              <h1 className="text-5xl md:text-7xl text-white font-playfair font-bold drop-shadow-[0_4px_8px_rgba(0,0,0,0.8)] z-20">
                Spring Camp
              </h1>
              <div className="mt-4 flex items-center gap-2 bg-white w-fit px-4 py-2 rounded-xl text-sm md:text-base font-bold shadow-md font-montserrat tracking-wide text-slate-800">
                <CalendarDays className="w-4 h-4 text-blue-600" />
                {tripData.dates}
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-4 relative z-20 -mt-8">
            <div className="animate-fade-in-up">
              <PersonalDashboard user={user} onLogout={handleLogout} />
            </div>

            <div className="animate-fade-in-up" style={{ animationDelay: '0.05s' }}>
              <QuickInfoBoard 
                onOpenWeather={() => setIsWeatherModalOpen(true)} 
                onOpenExchange={() => setIsExchangeModalOpen(true)}
                liveWeather={liveWeather} 
                liveExchange={liveExchange} 
              />
            </div>

            <div className="animate-fade-in-up" style={{ animationDelay: '0.08s' }}>
              <TravelToolsAccordion 
                onOpenTips={() => setIsTipsModalOpen(true)}
                onOpenPhrases={() => setIsPhrasesModalOpen(true)}
                onOpenMap={() => setIsMapModalOpen(true)}
                onOpenEmergency={() => setIsEmergencyModalOpen(true)}
              />
            </div>

            <div className="flex flex-col gap-4 animate-fade-in-up mt-6" style={{ animationDelay: '0.1s' }}>
              {tripData.days.map((day) => {
                const isExpanded = selectedDay === day.day;
                
                return (
                  <div key={day.day} className="flex flex-col">
                    <button 
                      onClick={() => setSelectedDay(isExpanded ? null : day.day)}
                      className={`w-full text-left flex items-center justify-between p-4 md:p-6 rounded-[2rem] transition-all duration-500 shadow-sm border overflow-hidden relative group ${
                        isExpanded 
                          ? 'bg-[#1C1514] text-white border-[#1C1514] shadow-2xl' 
                          : 'bg-white hover:bg-red-50/40 border-slate-200'
                      }`}
                    >
                      <div className="flex items-center gap-4 md:gap-6 relative z-10">
                        <div className={`flex flex-col items-center justify-center w-16 h-16 flex-shrink-0 rounded-[1.1rem] bg-[#8B1D1D] text-white shadow-md relative overflow-hidden transition-transform duration-500 ${isExpanded ? 'scale-105 shadow-red-900/40' : 'group-hover:scale-105'}`}>
                          <span className="font-jua text-base leading-none">{chineseDays[day.day]}</span>
                          <span className="font-montserrat text-[10px] font-black tracking-widest mt-1.5 opacity-90">DAY {day.day}</span>
                        </div>
                        <div>
                          <h2 className={`text-xl md:text-2xl font-black font-montserrat tracking-tight transition-colors duration-500 ${isExpanded ? 'text-white' : 'text-slate-800'}`}>
                            {day.date}
                          </h2>
                          <p className={`text-sm font-jua mt-1 transition-colors duration-500 ${isExpanded ? 'text-[#FFD700]' : 'text-slate-500'}`}>
                            {day.title}
                          </p>
                        </div>
                      </div>
                      <div className={`p-2.5 rounded-full transition-all duration-500 relative z-10 ${isExpanded ? 'bg-white/10 text-[#FFD700]' : 'bg-slate-100 text-slate-400'}`}>
                        <ChevronDownIcon className={`w-5 h-5 transition-transform duration-500 ${isExpanded ? 'rotate-180' : ''}`} />
                      </div>
                    </button>

                    <div className={`accordion-grid ${isExpanded ? 'expanded' : ''}`}>
                      <div className="accordion-content-inner">
                        <div className="pt-6 pb-4 md:pb-8">
                          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                            {day.events.map((event, index) => (
                              <EventCard key={index} event={event} />
                            ))}
                            <EndOfDayCard day={day.day} />
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </main>

          <footer className="bg-slate-100 border-t border-slate-200 py-12 mt-10 text-center text-slate-400 text-sm">
            <p className="font-montserrat font-bold text-slate-500">© 2026 INCAR Financial Service. All rights reserved.</p>
            <p className="mt-2 text-xs text-slate-400 font-jua opacity-80">Designed with First Principles.</p>
          </footer>

          <WeatherModal isOpen={isWeatherModalOpen} onClose={() => setIsWeatherModalOpen(false)} liveWeather={liveWeather} />
          <ExchangeModal isOpen={isExchangeModalOpen} onClose={() => setIsExchangeModalOpen(false)} liveExchange={liveExchange} />
          <TipsModal isOpen={isTipsModalOpen} onClose={() => setIsTipsModalOpen(false)} />
          <PhrasesModal isOpen={isPhrasesModalOpen} onClose={() => setIsPhrasesModalOpen(false)} />
          <MapModal isOpen={isMapModalOpen} onClose={() => setIsMapModalOpen(false)} />
          <EmergencyModal isOpen={isEmergencyModalOpen} onClose={() => setIsEmergencyModalOpen(false)} />
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
